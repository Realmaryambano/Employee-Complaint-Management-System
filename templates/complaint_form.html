<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ECMS | Complaint Form</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">


</head>


<body>


    <header class="top-header">


        <div class="brand">

            <img src="{{ url_for('static', filename='images/company_logo.png') }}" alt="Company Logo">


            <div>

                <h2>
                    Employee Complaint Management System
                </h2>

                <p>
                    Complaint Form
                </p>

            </div>

        </div>



        <a href="{{ url_for('employee_dashboard') }}" class="back-link">

            ← Dashboard

        </a>


    </header>





    <main class="form-page">


        <div class="page-heading">


            <h1>
                Raise New Complaint
            </h1>


            <p>
                Submit your issue to the IT Department for resolution.
            </p>


        </div>



        <form action="{{ url_for('complaint_form') }}" method="POST" enctype="multipart/form-data">



            <!-- ================= EMPLOYEE INFORMATION ================= -->


            <section class="form-section">


                <div class="section-title">
                    <h2>Employee Information</h2>
                </div>



                <div class="info-grid">


                    <div class="info-box">

                        <label>
                            Employee Name
                        </label>

                        <input type="text" value="{{ employee[0] }}" readonly>

                    </div>




                    <div class="info-box">

                        <label>
                            Employee ID
                        </label>

                        <input type="text" value="{{ employee[1] }}" readonly>

                    </div>




                    <div class="info-box">

                        <label>
                            Department
                        </label>

                        <input type="text" value="{{ employee[2] }}" readonly>

                    </div>




                    <div class="info-box">

                        <label>
                            Email
                        </label>

                        <input type="email" value="{{ employee[3] }}" readonly>

                    </div>




<div class="info-box">

    <label>
        Date
    </label>

    <input type="text" value="{{ employee[4] }}" readonly>

</div>




<div class="info-box">

    <label>
        Time
    </label>

    <input type="text" value="{{ employee[5] }}" readonly>

</div>



                </div>


            </section>





            <!-- ================= COMPLAINT INFORMATION ================= -->


            <section class="form-section">


                <div class="section-title">

                    <h2>
                        Complaint Information
                    </h2>

                </div>



                <div class="input-grid">



                    <div class="form-group">


                        <label>
                            Issue Title
                        </label>


                        <input type="text" name="issue_title" placeholder="e.g. POS terminal not printing receipts"
                            required>


                    </div>





                    <div class="form-group">


                        <label>
                            Category
                        </label>


                        <select name="category" required>


                            <option value="" disabled selected>
                                Select Category
                            </option>


                            <option>Hardware</option>

                            <option>Software</option>

                            <option>Printer / Scanner</option>

                            <option>POS Machine</option>

                            <option>ERP System</option>

                            <option>Network / Internet</option>

                            <option>Email</option>

                            <option>Access Request</option>

                            <option>Biometric Device</option>

                            <option>CCTV</option>

                            <option>Other</option>


                        </select>


                    </div>


                </div>





                <div class="input-grid">


                    <div class="form-group">


                        <label>
                            Priority
                        </label>


                        <select name="priority" required>


                            <option value="" disabled selected>
                                Select Priority
                            </option>


                            <option>Low</option>

                            <option>Medium</option>

                            <option>High</option>

                            <option>Critical</option>


                        </select>


                    </div>





                    <div class="form-group">


                        <label>
                            Store / Branch Location
                        </label>


                        <input type="text" name="store_location" placeholder="e.g. Dolmen Mall Clifton" required>


                    </div>



                </div>


            </section>





            <!-- ================= ADDITIONAL DETAILS ================= -->


            <section class="form-section">


                <div class="section-title">

                    <h2>
                        Additional Details
                    </h2>

                </div>





                <div class="input-grid">


                    <div class="form-group">


                        <label>
                            Contact Number
                        </label>


                        <input type="tel" name="contact_number" placeholder="03XX-XXXXXXX" required>


                    </div>





                    <div class="form-group">


                        <label>
                            Device / Asset Name
                        </label>


                        <input type="text" name="device_name" placeholder="Optional">


                    </div>



                </div>






                <div class="form-group">


                    <label>
                        Description
                    </label>


                    <textarea name="description" rows="7" placeholder="Describe your issue in detail..."
                        required></textarea>


                </div>





                <div class="form-group">


                    <label>
                        Attachment (Optional)
                    </label>


                    <input type="file" name="attachment" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">


                </div>





                <div class="form-actions">


                    <button type="submit">

                        Submit Complaint

                    </button>


                </div>


            </section>



        </form>


    </main>





    <footer>

        © 2026 Bonanza Satrangi | Employee Complaint Management System

    </footer>



</body>

</html>
