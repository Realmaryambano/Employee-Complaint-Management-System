<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Complaint Management System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-container">

        <div class="logo">
            <img src="{{ url_for('static', filename='images/company_logo.png') }}" alt="Company Logo">
        </div>

        <h1>Employee Complaint Management System</h1>

        <p class="subtitle">
            Sign in using your company credentials
        </p>

        <form action="employee_dashboard.html" method="GET">

            <div class="form-group">
                <label for="username">Employee ID / Email</label>
                <input type="text" id="username" name="username" placeholder="Enter Employee ID or Email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>

            <p class="forgot-password">
                Forgot Password? Please contact <strong>IT Support.</strong>
            </p>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

    </div>

</body>

</html>
