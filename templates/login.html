<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ECMS | Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

    <div class="login-container">

        <!-- Company Logo -->
        <div class="logo">
            <img src="{{ url_for('static', filename='images/company_logo.png') }}" alt="Company Logo">
        </div>

        <!-- Heading -->
        <h1>Employee Complaint Management System</h1>

        <p class="subtitle">
            Sign in using your company credentials
        </p>
        {% if error %}
        <p class="error-message">
            {{ error }}
        </p>
        {% endif %}

        <!-- Login Form -->
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Employee ID / Email</label>
                <input type="text" id="username" name="username" placeholder="Enter Employee ID or Email"
                    autocomplete="username" required>

            </div>
            <div class="form-group">

                <label for="password">Password</label>

                <input type="password" id="password" name="password" placeholder="Enter Password"
                    autocomplete="current-password" required>

            </div>

            <div class="forgot-password">

                <a href="{{ url_for('it_support') }}">
                    Forgot Password?
                </a>

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>
        <!-- Footer -->
        <footer>
            © 2026 Bonanza Satrangi | Employee Complaint Management System
        </footer>
    </div>
</body>

</html>
